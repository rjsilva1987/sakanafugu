<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fugu Chat</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');

    :root {
      --bg:       #0a0f1e;
      --surface:  #111827;
      --border:   #1f2d45;
      --accent:   #38bdf8;
      --accent2:  #0ea5e9;
      --user-bg:  #164e63;
      --bot-bg:   #111827;
      --text:     #e2e8f0;
      --muted:    #64748b;
      --danger:   #f87171;
      --success:  #34d399;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 24px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .logo { font-size: 22px; line-height: 1; }
    .header-title { font-size: 16px; font-weight: 600; letter-spacing: -0.01em; }
    .badge {
      margin-left: auto;
      background: rgba(56,189,248,.12);
      color: var(--accent);
      border: 1px solid rgba(56,189,248,.25);
      border-radius: 20px;
      padding: 3px 10px;
      font-size: 11px;
      font-family: 'JetBrains Mono', monospace;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: .08em;
    }
    .badge.unconfigured { background: rgba(248,113,113,.12); color: var(--danger); border-color: rgba(248,113,113,.25); }

    /* ── Messages ── */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      scroll-behavior: smooth;
    }
    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .msg {
      display: flex;
      gap: 12px;
      max-width: 820px;
      width: 100%;
      animation: fadeUp .2s ease;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .msg.user { margin-left: auto; flex-direction: row-reverse; }

    .avatar {
      width: 34px; height: 34px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
      margin-top: 2px;
    }
    .msg.user .avatar { background: var(--user-bg); }
    .msg.bot  .avatar { background: var(--border); }

    .bubble {
      padding: 12px 16px;
      border-radius: 14px;
      line-height: 1.65;
      font-size: 14.5px;
      max-width: calc(100% - 50px);
      white-space: pre-wrap;
      word-break: break-word;
    }
    .msg.user .bubble { background: var(--user-bg); border-top-right-radius: 4px; color: #bae6fd; }
    .msg.bot  .bubble { background: var(--bot-bg); border: 1px solid var(--border); border-top-left-radius: 4px; }
    .bubble.thinking  { color: var(--muted); font-style: italic; font-size: 13px; }

    /* ── Attachments inside bubble ── */
    .attachments {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 8px;
    }
    .attach-thumb {
      position: relative;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,.1);
      max-width: 200px;
      max-height: 160px;
    }
    .attach-thumb img { display: block; max-width: 200px; max-height: 160px; object-fit: cover; }
    .attach-doc {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(56,189,248,.08);
      border: 1px solid rgba(56,189,248,.2);
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 13px;
      color: var(--accent);
    }
    .attach-doc span { max-width: 160px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    /* ── Cursor ── */
    .cursor {
      display: inline-block;
      width: 7px; height: 14px;
      background: var(--accent);
      border-radius: 1px;
      margin-left: 2px;
      vertical-align: middle;
      animation: blink .9s step-end infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

    /* ── Empty state ── */
    #empty-state {
      flex: 1;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 10px;
      color: var(--muted);
      text-align: center;
      padding-bottom: 60px;
    }
    #empty-state .big-logo { font-size: 52px; }
    #empty-state h2 { font-size: 18px; font-weight: 500; color: var(--text); }
    #empty-state p  { font-size: 13px; max-width: 320px; line-height: 1.6; }

    /* ── Input bar ── */
    #input-bar {
      padding: 12px 24px 18px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    /* Preview fila de arquivos */
    #file-preview {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 8px;
    }
    .preview-chip {
      display: flex; align-items: center; gap: 6px;
      background: rgba(56,189,248,.08);
      border: 1px solid rgba(56,189,248,.2);
      border-radius: 20px;
      padding: 4px 10px 4px 6px;
      font-size: 12px;
      color: var(--accent);
      max-width: 200px;
    }
    .preview-chip img {
      width: 24px; height: 24px;
      border-radius: 4px; object-fit: cover; flex-shrink: 0;
    }
    .preview-chip .chip-icon { font-size: 16px; flex-shrink: 0; }
    .preview-chip .chip-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .preview-chip .chip-remove {
      cursor: pointer; color: var(--muted); font-size: 14px;
      flex-shrink: 0; line-height: 1;
      transition: color .15s;
    }
    .preview-chip .chip-remove:hover { color: var(--danger); }

    .input-wrap {
      display: flex; align-items: flex-end; gap: 10px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 10px 10px 10px 16px;
      transition: border-color .2s;
    }
    .input-wrap:focus-within { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(56,189,248,.08); }

    #user-input {
      flex: 1;
      background: transparent; border: none; outline: none;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 14.5px;
      resize: none; max-height: 160px; line-height: 1.55;
    }
    #user-input::placeholder { color: var(--muted); }

    .btn-icon {
      width: 36px; height: 36px;
      border-radius: 9px; border: none;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: background .15s, transform .1s;
    }
    #attach-btn {
      background: transparent;
      color: var(--muted);
    }
    #attach-btn:hover { background: var(--border); color: var(--accent); }
    #attach-btn svg  { width: 18px; height: 18px; }

    #send-btn {
      background: var(--accent);
      color: #0a0f1e;
    }
    #send-btn:hover:not(:disabled) { background: var(--accent2); }
    #send-btn:active:not(:disabled) { transform: scale(.94); }
    #send-btn:disabled { background: var(--border); color: var(--muted); cursor: not-allowed; }
    #send-btn svg { width: 16px; height: 16px; }

    #file-input { display: none; }

    .hint { text-align: center; color: var(--muted); font-size: 11px; margin-top: 8px; }

    /* ── Config warning ── */
    #config-warning {
      display: none;
      margin: 12px 24px 0;
      background: rgba(248,113,113,.08);
      border: 1px solid rgba(248,113,113,.25);
      color: var(--danger);
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 13px;
    }
    #config-warning code {
      font-family: 'JetBrains Mono', monospace;
      background: rgba(248,113,113,.15);
      padding: 1px 5px; border-radius: 4px;
    }
  </style>
</head>
<body>

<header>
  <div class="logo">🐡</div>
  <div><div class="header-title">Fugu Chat</div></div>
  <span class="badge" id="model-badge">{{ model }}</span>
</header>

<div id="config-warning">
  ⚠️ Chave de API não configurada. Copie <code>.env.example</code> para <code>.env</code> e adicione sua <code>SAKANA_API_KEY</code>.
</div>

<div id="messages">
  <div id="empty-state">
    <div class="big-logo">🐡</div>
    <h2>Fugu está pronto</h2>
    <p>Envie texto, imagens ou documentos PDF para começar a conversa.</p>
  </div>
</div>

<div id="input-bar">
  <div id="file-preview"></div>
  <div class="input-wrap">
    <!-- botão de anexo -->
    <button id="attach-btn" class="btn-icon" title="Anexar imagem ou PDF">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66L9.41 17.41a2 2 0 01-2.83-2.83l8.49-8.48"/>
      </svg>
    </button>
    <input type="file" id="file-input" multiple accept="image/*,.pdf" />

    <textarea id="user-input" rows="1" placeholder="Escreva sua mensagem…"></textarea>

    <button id="send-btn" class="btn-icon" title="Enviar (Enter)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"></line>
        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
      </svg>
    </button>
  </div>
  <div class="hint">Enter para enviar · Shift+Enter para nova linha · 📎 imagens e PDFs até 20 MB</div>
</div>

<script>
  const messagesEl  = document.getElementById('messages');
  const emptyState  = document.getElementById('empty-state');
  const inputEl     = document.getElementById('user-input');
  const sendBtn     = document.getElementById('send-btn');
  const attachBtn   = document.getElementById('attach-btn');
  const fileInput   = document.getElementById('file-input');
  const filePreview = document.getElementById('file-preview');
  const modelBadge  = document.getElementById('model-badge');
  const configWarn  = document.getElementById('config-warning');

  // Histórico de mensagens (apenas texto/role, sem binários)
  let history   = [];
  let pendingFiles = [];   // File objects aguardando envio
  let streaming = false;

  // ── Config ────────────────────────────────────────────────────────────────
  fetch('/api/config').then(r => r.json()).then(cfg => {
    if (!cfg.api_configured) {
      configWarn.style.display = 'block';
      modelBadge.textContent = 'sem chave';
      modelBadge.classList.add('unconfigured');
    }
  });

  // ── Auto-resize textarea ──────────────────────────────────────────────────
  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 160) + 'px';
  });

  inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
  });

  sendBtn.addEventListener('click', send);

  // ── Attach button ─────────────────────────────────────────────────────────
  attachBtn.addEventListener('click', () => fileInput.click());

  fileInput.addEventListener('change', () => {
    Array.from(fileInput.files).forEach(addFile);
    fileInput.value = '';
  });

  // Drag-and-drop na área de mensagens
  messagesEl.addEventListener('dragover', e => { e.preventDefault(); e.dataTransfer.dropEffect = 'copy'; });
  messagesEl.addEventListener('drop', e => {
    e.preventDefault();
    Array.from(e.dataTransfer.files).forEach(addFile);
  });

  function addFile(file) {
    const allowed = ['image/jpeg','image/png','image/gif','image/webp','application/pdf'];
    if (!allowed.includes(file.type)) {
      alert(`Tipo não suportado: ${file.name}\nUse imagens (JPG, PNG, GIF, WEBP) ou PDF.`);
      return;
    }
    if (file.size > 20 * 1024 * 1024) {
      alert(`Arquivo muito grande: ${file.name}\nLimite: 20 MB.`);
      return;
    }
    pendingFiles.push(file);
    renderPreview();
  }

  function renderPreview() {
    filePreview.innerHTML = '';
    pendingFiles.forEach((file, idx) => {
      const chip = document.createElement('div');
      chip.className = 'preview-chip';

      if (file.type.startsWith('image/')) {
        const img = document.createElement('img');
        img.src = URL.createObjectURL(file);
        chip.appendChild(img);
      } else {
        const icon = document.createElement('span');
        icon.className = 'chip-icon';
        icon.textContent = '📄';
        chip.appendChild(icon);
      }

      const name = document.createElement('span');
      name.className = 'chip-name';
      name.textContent = file.name;
      chip.appendChild(name);

      const rm = document.createElement('span');
      rm.className = 'chip-remove';
      rm.textContent = '×';
      rm.title = 'Remover';
      rm.addEventListener('click', () => { pendingFiles.splice(idx, 1); renderPreview(); });
      chip.appendChild(rm);

      filePreview.appendChild(chip);
    });
  }

  // ── Send ──────────────────────────────────────────────────────────────────
  async function send() {
    const text  = inputEl.value.trim();
    const files = [...pendingFiles];

    if ((!text && files.length === 0) || streaming) return;

    emptyState.style.display = 'none';
    appendUserMsg(text, files);

    // Limpa inputs
    inputEl.value = '';
    inputEl.style.height = 'auto';
    pendingFiles = [];
    renderPreview();
    setStreaming(true);

    const botBubble = appendMsg('bot', '', true);

    try {
      let res;

      if (files.length > 0) {
        // ── Multipart ────────────────────────────────────────────────────────
        const form = new FormData();
        form.append('messages', JSON.stringify(history));
        form.append('text', text);
        files.forEach(f => form.append('files', f));

        res = await fetch('/api/chat', { method: 'POST', body: form });
      } else {
        // ── JSON puro ────────────────────────────────────────────────────────
        history.push({ role: 'user', content: text });
        res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ messages: history }),
        });
      }

      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        botBubble.textContent = '⚠️ ' + (err.error || 'Erro desconhecido.');
        return;
      }

      const reader   = res.body.getReader();
      const decoder  = new TextDecoder();
      let fullText   = '';
      const cursor   = document.createElement('span');
      cursor.className = 'cursor';
      botBubble.textContent = '';
      botBubble.appendChild(cursor);

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        fullText += decoder.decode(value, { stream: true });
        botBubble.textContent = fullText;
        botBubble.appendChild(cursor);
        scrollBottom();
      }

      cursor.remove();

      // Atualiza histórico com mensagem do usuário (quando havia arquivos)
      if (files.length > 0) {
        const label = files.map(f => `[arquivo: ${f.name}]`).join(' ');
        history.push({ role: 'user', content: text ? `${text}\n${label}` : label });
      }
      history.push({ role: 'assistant', content: fullText });

    } catch (err) {
      botBubble.textContent = '⚠️ Erro de conexão: ' + err.message;
    } finally {
      setStreaming(false);
      scrollBottom();
    }
  }

  // ── Helpers ───────────────────────────────────────────────────────────────
  function appendUserMsg(text, files) {
    const wrap = document.createElement('div');
    wrap.className = 'msg user';

    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = '🧑';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';

    // Miniaturas de arquivos
    if (files.length > 0) {
      const attachDiv = document.createElement('div');
      attachDiv.className = 'attachments';

      files.forEach(file => {
        if (file.type.startsWith('image/')) {
          const thumb = document.createElement('div');
          thumb.className = 'attach-thumb';
          const img = document.createElement('img');
          img.src = URL.createObjectURL(file);
          thumb.appendChild(img);
          attachDiv.appendChild(thumb);
        } else {
          const doc = document.createElement('div');
          doc.className = 'attach-doc';
          doc.innerHTML = `<span style="font-size:20px">📄</span><span>${file.name}</span>`;
          attachDiv.appendChild(doc);
        }
      });

      bubble.appendChild(attachDiv);
    }

    if (text) {
      const textNode = document.createTextNode(text);
      bubble.appendChild(textNode);
    }

    wrap.appendChild(avatar);
    wrap.appendChild(bubble);
    messagesEl.appendChild(wrap);
    scrollBottom();
  }

  function appendMsg(role, text, thinking = false) {
    const wrap = document.createElement('div');
    wrap.className = 'msg ' + role;

    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = role === 'user' ? '🧑' : '🐡';

    const bubble = document.createElement('div');
    bubble.className = 'bubble' + (thinking ? ' thinking' : '');
    bubble.textContent = thinking ? 'Pensando…' : text;

    wrap.appendChild(avatar);
    wrap.appendChild(bubble);
    messagesEl.appendChild(wrap);
    scrollBottom();
    return bubble;
  }

  function setStreaming(val) {
    streaming = val;
    sendBtn.disabled = val;
    inputEl.disabled = val;
    attachBtn.disabled = val;
  }

  function scrollBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }
</script>
</body>
</html>
